name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-bun:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                bun-version: [latest, canary]
        name: Test (Bun ${{ matrix.bun-version }})

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ matrix.bun-version }}

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Typecheck
              run: bun run typecheck

            - name: Run tests
              run: bun test

            - name: Build
              run: bun run build

    test-node:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [18, 20, 22]
        name: Test (Node ${{ matrix.node-version }})

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run tests
              run: bun test

            - name: Build
              run: bun run build

    test-deno:
        runs-on: ubuntu-latest
        name: Test (Deno)

        steps:
            - uses: actions/checkout@v4

            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build
              run: bun run build

            - name: Run tests
              run: deno test --allow-read --allow-env tests/
